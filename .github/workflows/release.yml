name: Release App
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        # 1. 核心优化：只需 2 台极速服务器（Mac 统一用最新 M1，Windows 用最新）
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # 2. 核心优化：如果是 Mac，在极速服务器上同时安装 Intel 和 Apple Silicon 编译依赖
      - name: Install Rust targets (macOS only)
        if: matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}-cargo

      - name: Install frontend dependencies
        run: npm install

      # 3. 核心优化：如果是 Mac，指令增加 --target universal-apple-darwin 参数编译双架构包
      - name: Build and Publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ReqFlow ${{ github.ref_name }}'
          releaseBody: 'ReqFlow 桌面客户端最新版发布。'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.platform == 'macos-latest' && '--target universal-apple-darwin' || '' }}